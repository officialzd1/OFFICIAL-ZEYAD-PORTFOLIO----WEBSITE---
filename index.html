<section id="order-form" style="padding: 50px;">
    <h2 style="text-align: center;">اطلب خدمتك الآن / Order Now</h2>
    <form id="my-form" action="https://formspree.io/f/xeewdywy" method="POST">
        
        <label style="display: block; overflow: hidden;">
            <span style="float: right;">الاسم</span>
            <span style="float: left;">Name</span>
        </label>
        <input type="text" name="name" required>
        
        <label style="display: block; overflow: hidden;">
            <span style="float: right;">رابط الفيديو ( Drive ) </span>
            <span style="float: left;">Video Link</span>
        </label>
        <input type="url" name="video-link" placeholder="تأكد من إتاحة الرابط                                                                    Make sure link is public" required>
        
        <label style="display: block; overflow: hidden;">
            <span style="float: right;">نوع الفيديو</span>
            <span style="float: left;">Video Type</span>
        </label>
        <select name="video-type">
            <option value="youtube">يوتيوب / YouTube</option>
            <option value="reels">ريلز / Reels</option>
            <option value="ad">إعلان / Advertisement</option>
        </select>
        
        <label style="display: block; overflow: hidden;">
            <span style="float: right;">ملاحظات إضافية</span>
            <span style="float: left;">Additional Notes</span>
        </label>
        <textarea name="message" style="height: 100px;"></textarea>
        
        <button type="submit" id="my-form-button">إرسال الطلب / Order Now</button>
    </form>
    <p id="my-form-status" style="text-align: center; font-size: 20px;"></p>
</section>



<section id="soon" style="height: 100vh; display: flex; justify-content: center; align-items: center;">

</section>

<a href="https://instagram.com/officialzd1" class="social-btn instagram" target="_blank">Instagram</a>
</div>



<script>
    var form = document.getElementById("my-form");
    
    async function handleSubmit(event) {
        event.preventDefault();
        var status = document.getElementById("my-form-status");
        var data = new FormData(event.target);
        fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (response.ok) {
                // هنا يختفي النموذج وتظهر علامة الصح
                form.innerHTML = "<div style='text-align:center; font-size: 50px;'>✅</div><h3 style='text-align:center;'>تم استلام طلبك بنجاح!</h3>";
            } else {
                status.innerHTML = "حدث خطأ ما، حاول مجدداً.";
            }
        }).catch(error => {
            status.innerHTML = "حدث خطأ ما، حاول مجدداً.";
        });
    }
    form.addEventListener("submit", handleSubmit);
</script>



</body>
